name: Generate note draft (Phase 1)

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "記事テーマ"
        required: true
        type: string
      tone:
        description: "文体（任意）"
        required: false
        default: "note向け、自然体。共感寄りで実用ノウハウも少し。"
        type: string
      words:
        description: "目安文字数（任意）"
        required: false
        default: "1800"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug endpoint DNS
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        run: |
          echo "AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}"
          python -c "import os,urllib.parse; ep=os.getenv('AZURE_OPENAI_ENDPOINT',''); print('raw:',repr(ep)); u=urllib.parse.urlparse(ep); print('hostname:',u.hostname); print('scheme:',u.scheme,'netloc:',u.netloc,'path:',u.path)"
          python -c "import os,urllib.parse,socket; host=urllib.parse.urlparse(os.getenv('AZURE_OPENAI_ENDPOINT','')).hostname; print('resolving:',host); print(socket.getaddrinfo(host,443))"

      - name: Generate article (OpenAI gpt-4.1)
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          THEME: ${{ inputs.theme }}
          TONE: ${{ inputs.tone }}
          WORDS: ${{ inputs.words }}
        # env:
        #   OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        #   THEME: ${{ inputs.theme }}
        #   TONE: ${{ inputs.tone }}
        #   WORDS: ${{ inputs.words }}

        run: |
          python scripts/generate_article.py


      - name: Generate image (MAI-Image-2e)
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_IMAGE_ENDPOINT: ${{ secrets.AZURE_OPENAI_IMAGE_ENDPOINT }}
          AZURE_OPENAI_IMAGE_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_IMAGE_DEPLOYMENT }}
          MAI_WIDTH: "1365"
          MAI_HEIGHT: "768"
        run: |
          RUN_ID=$(python -c "import json; print(json.load(open('run_log.txt','r',encoding='utf-8'))['run_id'])")
          RUN_DIR="drafts/generated/$RUN_ID"
          echo "RUN_DIR=$RUN_DIR" >> $GITHUB_ENV
          export RUN_DIR="$RUN_DIR"
          python scripts/generate_image_azure.py
     
      - name: Crop image for note
        run: |
          python scripts/crop_note_cover.py


      # - name: Upload artifacts (draft + images)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: generated-draft
      #     path: |
      #       drafts/generated/**
      #       assets/images/**
      #       run_log.txt
            
      - name: Restore note auth state
        env:
          NOTE_AUTH_JSON_BASE64: ${{ secrets.NOTE_AUTH_JSON_BASE64 }}
        run: |
          echo "$NOTE_AUTH_JSON_BASE64" | base64 -d > auth.json
          ls -la auth.json
          
      - name: Install Playwright (Python)
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
          
      - name: Post to note (draft only) - headed via Xvfb
        env:
          HEADLESS: "false"
          TEST_MODE: "false"
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a python scripts/post_to_note_draft.py


      - name: Set paths for posting (RUN_ID/RUN_DIR/IMAGES_DIR)
        run: |
          RUN_ID=$(python -c "import json; print(json.load(open('run_log.txt','r',encoding='utf-8'))['run_id'])")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_DIR=drafts/generated/$RUN_ID" >> $GITHUB_ENV
          echo "IMAGES_DIR=assets/images/$RUN_ID" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID"
          ls -la "drafts/generated/$RUN_ID" || true
          ls -la "assets/images/$RUN
          
      - name: Upload artifacts (draft + images + debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-draft
          path: |
            drafts/generated/**
            assets/images/**
            run_log.txt
            auth.json
            debug.png
            debug.html
            trace.zip
